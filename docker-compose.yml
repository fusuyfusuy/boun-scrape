services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - schedules-data:/data
    environment:
      - DB_PATH=${DB_PATH:-/data/schedules.db}
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: always

volumes:
  schedules-data:
